{% load static %}
<html>
    <head>
        <title>Prompt Tweaker</title>
        <link rel="stylesheet" href="{% static 'css/style_message_page.css' %}">
        <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    </head>
    <body>
        <div id="message-form">
            <h1>Prompt Tweak</h1>
            <div id="message-text-areas"> 
                <textarea id="prompt-text" placeholder="Enter your prompt..."></textarea>
                <textarea id="prompt-answer" placeholder="Response will appear here..."></textarea>
            </div>
            <div id="parameter-inputs">
                <div class="parameter">
                    <label for="temperature">temperature</label>
                    <input type="range" id="temperature" min="0" max="1" step="0.1" value="1">
                    <span id="temperature-value">1.00</span>
                </div>
                <div class="parameter">
                    <label for="top-k">top_k</label>
                    <input type="number" id="top-k" min="1" step="1" value="0" placeholder="top_k">
                </div>
                <div class="parameter">
                    <label for="max-tokens">max tokens</label>
                    <input type="number" id="max-tokens" min="1" max="4096" value="1024" placeholder="max tokens">
                </div>
            </div>
            <div id="submission-button">
                <button id="message-button">Enviar Prompt</button>
            </div>
        </div>
    <script>
        $(document).ready(function(){
            console.log("DOM is ready");
            
            $("#temperature").on("input", function(){
                $("#temperature-value").text(parseFloat(this.value).toFixed(1));
            });

            $("#max-tokens").on("change", function(){
                let val = parseInt(this.value);
                if (val > 4096) this.value = 4096;
                if (val < 1) this.value = 1;
            });

            $("#top-k").on("change", function(){
                let val = parseInt(this.value);
                if (val < 1) this.value = 1;
            });

            function sendPrompt(){
                const prompt = $("#prompt-text").val();
                const temperature = parseFloat($("#temperature").val());
                const topK = parseInt($("#top-k").val());
                const maxTokens = parseInt($("#max-tokens").val());

                $.ajax({
                   type: "POST",
                   url: "{% url 'message_claude' %}",
                    headers: {
                        'X-CSRFToken': "{{ csrf_token }}",
                    },
                   data: {
                       prompt: prompt,
                       temperature: temperature,
                       top_k: topK,
                       max_tokens: maxTokens,
                   },
                    success: function(response) {
                        console.log("Success:", response);
                        $("#prompt-answer").val(response.answer);
                    },
                    error: function(error) {
                        console.log("Error:", error);
                        console.log("Error sending prompt");
                    }
                });
            }

            $("#message-button").click(sendPrompt);
        });
    </script>
    </body>
</html>
